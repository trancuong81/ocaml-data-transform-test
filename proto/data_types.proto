syntax = "proto3";

package ocaml_data_transform;

// === Simple Types (structurally merged) ===

// Covers 21 CUE types: String, Ssn, Ein, Aba, Itin, Swift, Iban, Giin,
// UsZip, Email, PhoneFaxString, IsoCountryCode, IsoCurrencyCode,
// CountryString, StateProvince, City, NumberAndStreet, PostalZipCode,
// MoneyString, DateTimeString, TimeZoneOffset
message StringType {
  string type_id = 1;
  string value = 2;
  string regex = 3;
  repeated string format_patterns = 4;
}

// Covers 4 CUE types: Integer, Float, Percentage, Year
message NumberType {
  string type_id = 1;
  double value = 2;
  int32 decimal_places = 3;
  double min_value = 4;
  double max_value = 5;
}

message BooleanType {
  string type_id = 1;
  bool value = 2;
}

// Covers 3 CUE types: ShareClass, TransactionType, SubscriptionStatus
message EnumType {
  string type_id = 1;
  string value = 2;
  repeated string options = 3;
}

message MultipleCheckboxType {
  string type_id = 1;
  repeated string selected_keys = 2;
  repeated string all_option_keys_in_order = 3;
  repeated string all_option_labels_in_order = 4;
}

message RadioGroupType {
  string type_id = 1;
  string selected_key = 2;
  repeated string all_option_keys_in_order = 3;
  repeated string all_option_labels_in_order = 4;
}

// === Compound Types (one message each) ===

// PhoneFax compound — CUE line 117
message PhoneFaxType {
  string type_id = 1;
  string country_code = 2;
  string area_code = 3;
  string subscriber_number = 4;
  repeated string sub_field_keys_in_order = 5;
}

// DateTime compound — CUE line 146
message DateTimeType {
  string type_id = 1;
  int64 epoch_ms = 2;
  string zone_offset = 3;
  repeated string sub_field_keys_in_order = 4;
}

// Money compound — CUE line 213
message MoneyType {
  string type_id = 1;
  double amount = 2;
  int32 amount_decimal_places = 3;
  string iso_currency_code = 4;
  repeated string sub_field_keys_in_order = 5;
}

// Address compound — CUE line 325
message AddressType {
  string type_id = 1;
  string number_and_street = 2;
  string city = 3;
  string state_province = 4;
  string country = 5;
  string postal_zip_code = 6;
  string full_address = 7;
  repeated string sub_field_keys_in_order = 8;
}

// IndividualName — CUE line 340
message IndividualNameType {
  string type_id = 1;
  string prefix_name = 2;
  string first_name = 3;
  string middle_name = 4;
  string last_name = 5;
  string suffix_name = 6;
  string full_name = 7;
  string preferred_name = 8;
  string job_title = 9;
  repeated string sub_field_keys_in_order = 10;
}

// Country compound — CUE line 278
message CountryType {
  string type_id = 1;
  string country_name = 2;
  string iso_country_code = 3;
  repeated string sub_field_keys_in_order = 4;
}

// BaseContact — CUE line 358
message BaseContactType {
  string type_id = 1;
  string prefix_name = 2;
  string first_name = 3;
  string middle_name = 4;
  string last_name = 5;
  string suffix_name = 6;
  string full_name = 7;
  string preferred_name = 8;
  string job_title = 9;
  string email = 10;
  string phone = 11;
  string fax = 12;
  repeated string sub_field_keys_in_order = 13;
}

// Signatory — CUE line 421
message SignatoryType {
  string type_id = 1;
  string number_and_street = 2;
  string city = 3;
  string state_province = 4;
  string country = 5;
  string postal_zip_code = 6;
  string full_address = 7;
  string name = 8;
  string date = 9;
  string title = 10;
  string phone = 11;
  string email = 12;
  string signer_role = 13;
  repeated string sub_field_keys_in_order = 14;
}

// BankInfo — CUE line 443
message BankInfoType {
  string type_id = 1;
  string bank_name = 2;
  string bank_location = 3;
  string aba = 4;
  string swift = 5;
  repeated string sub_field_keys_in_order = 6;
}

// BankAccountInfo — CUE line 456
message BankAccountInfoType {
  string type_id = 1;
  string bank_name = 2;
  string bank_location = 3;
  string aba = 4;
  string swift = 5;
  string account_name = 6;
  string account_number = 7;
  string iban = 8;
  string further_credit_name = 9;
  string further_credit_account = 10;
  string correspondent_bank_account = 11;
  repeated string sub_field_keys_in_order = 12;
}

// WireInstructions — CUE line 475
message WireInstructionsType {
  string type_id = 1;
  string bank_name = 2;
  string bank_location = 3;
  string aba = 4;
  string swift = 5;
  string account_name = 6;
  string account_number = 7;
  string iban = 8;
  string further_credit_name = 9;
  string further_credit_account = 10;
  string correspondent_bank_account = 11;
  string attention = 12;
