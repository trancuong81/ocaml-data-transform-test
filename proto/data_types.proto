// SubmissionContact — CUE line 378
// Largest compound type with 33 subfields
message SubmissionContactType {
  string type_id = 1;
  string prefix_name = 2;
  string first_name = 3;
  string middle_name = 4;
  string last_name = 5;
  string suffix_name = 6;
  string full_name = 7;
  string preferred_name = 8;
  string job_title = 9;
  string email = 10;
  string phone = 11;
  string fax = 12;
  MultipleCheckboxType type_of_correspondences = 13;
  MultipleCheckboxType contact_types = 14;
  MultipleCheckboxType contact_roles = 15;
  string custom_id = 16;
  string address_number_and_street = 17;
  string address_city = 18;
  string address_state_province = 19;
  string address_country = 20;
  string address_postal_zip_code = 21;
  string address_full_address = 22;
  string relationship_with_primary = 23;
  string occupation = 24;
  string company_name = 25;
  string company_address_number_and_street = 26;
  string company_address_city = 27;
  string company_address_state_province = 28;
  string company_address_country = 29;
  string company_address_postal_zip_code = 30;
  string company_address_full_address = 31;
  string specified_company_org_unit = 32;
  string individual_email = 33;
  string individual_phone = 34;
  string individual_fax = 35;
  repeated string sub_field_keys_in_order = 36;
}

// CustomCompoundType — CUE line 540
// Flexible compound with arbitrary subfields — represented as JSON
message CustomCompoundType {
  string type_id = 1;
  string value_sub_fields_json = 2;
  repeated string sub_field_keys_in_order = 3;
}
