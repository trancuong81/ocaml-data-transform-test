// BrokerageFirm — CUE line 495
message BrokerageFirmType {
  string type_id = 1;
  string firm_name = 2;
  string firm_office_branch_location = 3;
  repeated string sub_field_keys_in_order = 4;
}

// BrokerageAccount — CUE line 506
message BrokerageAccountType {
  string type_id = 1;
  string firm_name = 2;
  string firm_office_branch_location = 3;
  string dtc_number = 4;
  string crest_participant_id = 5;
  string bic_code = 6;
  string beneficiary_account_number = 7;
  string beneficiary_account_name = 8;
  string intermediary_account_name = 9;
  string intermediary_account_number = 10;
  string intermediary_bic_code = 11;
  string securities_settlement_instructions = 12;
  string attention = 13;
  repeated string sub_field_keys_in_order = 14;
}

// ServiceContactPoint — CUE line 527
message ServiceContactPointType {
  string type_id = 1;
  string name = 2;
  string office_branch_location = 3;
  string phone = 4;
  string email = 5;
  repeated string sub_field_keys_in_order = 6;
